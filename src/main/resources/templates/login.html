<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Luxury Auto Showroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">

</head>
<body class="bg-dark">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header text-center">
                        <h3 class="mb-0">LUXURY AUTO SHOWROOM</h3>
                    </div>
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <img src="images/logo.png" alt="Logo" class="img-fluid mb-3" style="max-width: 150px;">
                            <h4>Đăng nhập</h4>
                        </div>

                        <form id="loginForm" method="post" action="login.php">
                            <div class="form-group mb-3">
                                <label for="phoneNumber">Số điện thoại</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                    <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" 
                                           placeholder="Nhập số điện thoại" required>
                                </div>
                            </div>

                            <div class="form-group mb-3">
                                <label for="password">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" 
                                           placeholder="Nhập mật khẩu" required>
                                </div>
                            </div>

                            <div class="form-group mb-3">
                                <div class="d-flex justify-content-between">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                                        <label class="form-check-label" for="rememberMe">Ghi nhớ đăng nhập</label>
                                    </div>
                                    <a href="forgot-password.html" class="text-primary">Quên mật khẩu?</a>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-3">Hoặc đăng nhập với</p>
                            <div class="d-flex justify-content-center gap-3">
                                <button onclick="loginWithFacebook()" class="btn btn-facebook btn-lg">
                                    <i class="fab fa-facebook-f"></i>
                                </button>
                                <button onclick="loginWithGoogle()" class="btn btn-google btn-lg">
                                    <i class="fab fa-google"></i>
                                </button>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <p>Chưa có tài khoản? 
                                <a href="register.html" class="text-primary">Đăng ký ngay</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>

</body>
</html>
