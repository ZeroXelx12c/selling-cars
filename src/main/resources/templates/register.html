<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Luxury Auto Showroom</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="css/register.css" rel="stylesheet">
    
</head>
<body class="bg-dark">
    <div class="container">
        <div class="row justify-content-center my-5">
            <div class="col-md-8">
                <div class="card shadow-lg">
                    <div class="card-header text-center">
                        <h3 class="mb-0">LUXURY AUTO SHOWROOM</h3>
                    </div>
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <img src="images/logo.png" alt="Logo" class="img-fluid mb-3" style="max-width: 150px;">
                            <h4>Đăng ký tài khoản</h4>
                        </div>

                        <form id="registerForm" method="post" action="register.php">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="fullName">Họ và tên</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                                            <input type="text" class="form-control" id="fullName" name="fullName" 
                                                   placeholder="Nhập họ và tên" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="phoneNumber">Số điện thoại</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                            <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" 
                                                   placeholder="Nhập số điện thoại" required>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="email">Email</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                            <input type="email" class="form-control" id="email" name="email" 
                                                   placeholder="Nhập địa chỉ email" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="dateOfBirth">Ngày sinh</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-calendar"></i></span>
                                            <input type="date" class="form-control" id="dateOfBirth" name="dateOfBirth" required>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="password">Mật khẩu</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                            <input type="password" class="form-control" id="password" name="password" 
                                                   placeholder="Nhập mật khẩu" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="confirmPassword">Xác nhận mật khẩu</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                                                   placeholder="Nhập lại mật khẩu" required>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="password-requirements mb-3">
                                <p class="mb-2">Yêu cầu mật khẩu:</p>
                                <div class="requirement-item">
                                    <i class="fas fa-circle"></i>Ít nhất 8 ký tự
                                </div>
                                <div class="requirement-item">
                                    <i class="fas fa-circle"></i>Bao gồm chữ hoa và chữ thường
                                </div>
                                <div class="requirement-item">
                                    <i class="fas fa-circle"></i>Ít nhất 1 số và 1 ký tự đặc biệt
                                </div>
                            </div>

                            <div class="form-group mb-3">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="terms" name="terms" required>
                                    <label class="form-check-label" for="terms">
                                        Tôi đồng ý với <a href="terms.html" target="_blank">điều khoản sử dụng</a> và 
                                        <a href="privacy.html" target="_blank">chính sách bảo mật</a>
                                    </label>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-user-plus"></i> Đăng ký
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-3">Hoặc đăng ký với</p>
                            <div class="d-flex justify-content-center gap-3">
                                <button onclick="registerWithFacebook()" class="btn btn-facebook btn-lg">
                                    <i class="fab fa-facebook-f"></i>
                                </button>
                                <button onclick="registerWithGoogle()" class="btn btn-google btn-lg">
                                    <i class="fab fa-google"></i>
                                </button>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <p>Đã có tài khoản? 
                                <a href="login.html" class="text-primary">Đăng nhập ngay</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/register.js"></script>
    
</body>
</html>
